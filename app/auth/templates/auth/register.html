<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
{#    Using the same naming conventions as locations, so the same stylesheet aswell.#}
    <link rel="stylesheet" href="{{ url_for('location.static', filename='locations.css') }}">
</head>
<body>
   <main class="page">
    <section class="card">
    <div class="header">
        <div>
            <p class="eyebrow">Car Rental System</p>
            <h1>Register</h1>
            <p class="subtitle">Create a new account.</p>
        </div>

        <a class="home-link" href="/">Back to Home</a>
    </div>

    {% if message %}
        <p class="message {{ css_class }}">{{ message }}</p>
    {% endif %}

    <form method="post" class="form-grid">

        <input type="text"
               name="fullname"
               placeholder="Full Name"
               value="{{ user.fullname if user else '' }}"
               class="form-input"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               value="{{ user.email if user else '' }}"
               class="form-input"
               required>

        <input type="text"
               name="username"
               placeholder="Username"
               value="{{ user.username if user else '' }}"
               class="form-input"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               class="form-input"
               required>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Register</button>

            <a href="{{ url_for('auth.login') }}" class="btn-secondary">
                Login
            </a>
        </div>

    </form>

</section>
</main>
</body>
</html>
