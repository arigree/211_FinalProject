<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rental</title>
</head>
<body>
<main class="page">
    <section class="card">

        <h2>Delete Rental</h2>

        <p>Are you sure you want to delete this rental?</p>

        <p style="font-weight: bold; margin: 10px 0;">
            Rental #{{ rental.rental_id }} — {{ rental.rental_status }}
        </p>

        <form method="POST"
              action="{{ url_for('rental.delete_rental_route', rental_id=rental.rental_id) }}">

            <div class="form-actions">
                <button type="submit" class="btn-danger">
                    Yes, Delete
                </button>

                <a href="{{ url_for('rental.show_rentals') }}"
                   class="btn-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </section>
</main>
</body>
</html>
