<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Detail</title>

    <!-- Link to staff CSS -->
    <link rel="stylesheet" href="{{ url_for('staff.static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>Staff Details</h1>

    <div class="card">
        <p><strong>ID:</strong> {{ staff.staff_id }}</p>
        <p><strong>Name:</strong> {{ staff.first_name }} {{ staff.last_name }}</p>
        <p><strong>Username:</strong> {{ staff.username }}</p>
        <p><strong>Email:</strong> {{ staff.email }}</p>
        <p><strong>Role:</strong> {{ staff.role }}</p>
        <p><strong>Phone:</strong> {{ staff.phone }}</p>
        <p><strong>Address:</strong> {{ staff.address }}</p>
    </div>

    <a class="btn" href="{{ url_for('staff.index') }}">Back to Staff List</a>
</div>

</body>
</html>
